name: Build Unsigned Artifacts

on:
  push:
    branches:
      - 'main'
  release:
    types: [released]
  pull_request:
    types:
      - 'ready_for_review'
      - 'opened'
      - 'synchronize'
  merge_group:
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: setup nodejs
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Generate lockfile hash without version
        id: lockfile-hash
        run: echo "hash=$(node .github/scripts/generate-lockfile-hash.js)" >> $GITHUB_OUTPUT

      - name: Cache node modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.electron
            ~/.electron-gyp
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-modules-${{ steps.lockfile-hash.outputs.hash }}

      - name: Install deps
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Get UV hash
        id: uv-hash
        run: |
          echo "hash=$(node -e "console.log(require('./package.json').uv.linux.sha256)")" >> $GITHUB_OUTPUT

      - name: Cache UV binaries
        id: cache-uv
        uses: actions/cache@v4
        with:
          path: assets/bin
          key: ${{ runner.os }}-uv-${{ steps.uv-hash.outputs.hash }}

      - name: Download uv
        if: steps.cache-uv.outputs.cache-hit != 'true'
        run: npm run download linux

      - name: Install bubblewrap
        run: sudo apt-get install -y bubblewrap

      - name: Build
        run: npm run package

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 'linux-artifacts-unsigned'
          path: |
            dist/*.AppImage
            dist/*.appimage
            dist/*.blockmap
            dist/*.yml
            dist/*.yaml

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: setup nodejs
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Generate lockfile hash without version
        id: lockfile-hash
        run: echo "hash=$(node .github/scripts/generate-lockfile-hash.js)" >> $GITHUB_OUTPUT

      - name: Cache node modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.electron
            ~/.electron-gyp
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-modules-${{ steps.lockfile-hash.outputs.hash }}

      - name: Install deps
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Get UV hash
        id: uv-hash
        run: |
          echo "hash=$(node -e "console.log(require('./package.json').uv.mac.sha256)")" >> $GITHUB_OUTPUT

      - name: Cache UV binaries
        id: cache-uv
        uses: actions/cache@v4
        with:
          path: assets/bin
          key: ${{ runner.os }}-uv-${{ steps.uv-hash.outputs.hash }}

      - name: Download uv
        if: steps.cache-uv.outputs.cache-hit != 'true'
        run: npm run download mac

      - name: Build
        run: npm run package
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 'macos-artifacts-unsigned'
          path: |
            dist/*.dmg
            dist/*.DMG
            dist/*.zip
            dist/*.ZIP
            dist/*.blockmap
            dist/*.yml
            dist/*.yaml

  build-macos-x64:
    runs-on: macos-15-intel

    steps:
      - uses: actions/checkout@v4

      - name: setup nodejs
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Generate lockfile hash without version
        id: lockfile-hash
        run: echo "hash=$(node .github/scripts/generate-lockfile-hash.js)" >> $GITHUB_OUTPUT

      - name: Cache node modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.electron
            ~/.electron-gyp
          key: ${{ runner.os }}-x64-node-${{ env.NODE_VERSION }}-modules-${{ steps.lockfile-hash.outputs.hash }}

      - name: Install deps
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Get UV hash
        id: uv-hash
        run: |
          echo "hash=$(node -e "console.log(require('./package.json').uv['mac-x64'].sha256)")" >> $GITHUB_OUTPUT

      - name: Cache UV binaries
        id: cache-uv
        uses: actions/cache@v4
        with:
          path: assets/bin
          key: ${{ runner.os }}-x64-uv-${{ steps.uv-hash.outputs.hash }}

      - name: Download uv
        if: steps.cache-uv.outputs.cache-hit != 'true'
        run: npm run download mac-x64

      - name: Build
        run: npm run package
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 'macos-x64-artifacts-unsigned'
          path: |
            dist/*.dmg
            dist/*.DMG
            dist/*.zip
            dist/*.ZIP
            dist/*.blockmap
            dist/*.yml
            dist/*.yaml

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup nodejs
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Generate lockfile hash without version
        id: lockfile-hash
        shell: bash
        run: echo "hash=$(node .github/scripts/generate-lockfile-hash.js)" >> $GITHUB_OUTPUT

      - name: Cache node modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.electron
            ~/.electron-gyp
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-modules-${{ steps.lockfile-hash.outputs.hash }}

      - name: Install deps
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Get UV hash
        id: uv-hash
        shell: bash
        run: |
          echo "hash=$(node -e "console.log(require('./package.json').uv.win.sha256)")" >> $GITHUB_OUTPUT

      - name: Cache UV binaries
        id: cache-uv
        uses: actions/cache@v4
        with:
          path: assets/bin
          key: ${{ runner.os }}-uv-${{ steps.uv-hash.outputs.hash }}

      - name: Download uv
        if: steps.cache-uv.outputs.cache-hit != 'true'
        run: npm run download win

      - name: Build
        run: npm run package

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 'windows-artifacts-unsigned'
          path: |
            dist/*.exe
            dist/*.EXE
            dist/*.blockmap
            dist/*.yml
            dist/*.yaml

  smoke-windows:
    # End-to-end smoke test of the packaged, unsigned Windows build. Installs
    # via NSIS silently, launches the app with OMNI_CI_AUTOINSTALL=1 (see
    # src/main/index.ts), and asserts the managed Python venv is created.
    # Catches asar-unpack regressions (pty.node, winpty-agent.exe, bundled
    # uv.exe under resources/bin) and fuses/IPC issues that the lightweight
    # uv-venv-smoke workflow can't see.
    needs: build-windows
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts-unsigned
          path: artifacts

      - name: Locate installer
        id: installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem artifacts -Filter '*.exe' | Select-Object -First 1
          if (-not $exe) { throw 'No .exe found in artifacts' }
          "path=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Silent install
        shell: cmd
        run: |
          "${{ steps.installer.outputs.path }}" /S /D=C:\OmniTest
          if errorlevel 1 exit /b %errorlevel%

      - name: Verify install layout
        shell: pwsh
        run: |
          $app = 'C:\OmniTest\Omni Code.exe'
          if (-not (Test-Path $app)) {
            Get-ChildItem C:\OmniTest -Recurse -Depth 2 | Format-Table -AutoSize
            throw "Omni Code.exe not found at $app"
          }

      - name: Run auto-install flow
        shell: pwsh
        env:
          OMNI_CI_AUTOINSTALL: '1'
          ELECTRON_ENABLE_LOGGING: '1'
        run: |
          $app = 'C:\OmniTest\Omni Code.exe'
          $stdout = 'C:\OmniTest\ci-stdout.log'
          $stderr = 'C:\OmniTest\ci-stderr.log'
          $proc = Start-Process -FilePath $app -PassThru -RedirectStandardOutput $stdout -RedirectStandardError $stderr
          if (-not $proc.WaitForExit(900000)) {
            Stop-Process -Id $proc.Id -Force
            Get-Content $stdout, $stderr -ErrorAction SilentlyContinue
            throw 'App did not exit within 15 minutes'
          }
          Write-Host "--- stdout ---"
          Get-Content $stdout -ErrorAction SilentlyContinue
          Write-Host "--- stderr ---"
          Get-Content $stderr -ErrorAction SilentlyContinue
          if ($proc.ExitCode -ne 0) {
            throw "App exited with code $($proc.ExitCode)"
          }

      - name: Verify venv on disk
        shell: pwsh
        run: |
          $venv = Join-Path $env:APPDATA 'Omni Code\omni\.venv'
          foreach ($rel in @('Scripts\python.exe', 'Scripts\activate', 'Scripts\omni.exe')) {
            $p = Join-Path $venv $rel
            if (-not (Test-Path $p)) { throw "Missing: $p" }
          }
          Write-Host "venv OK at $venv"

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-windows-diagnostics
          path: |
            C:\OmniTest\ci-stdout.log
            C:\OmniTest\ci-stderr.log
            C:\Users\runneradmin\AppData\Roaming\Omni Code\logs
          if-no-files-found: ignore

  publish-release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-linux, build-macos, build-macos-x64, build-windows, smoke-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -e "console.log(require('./package.json').version)")" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la artifacts/

      - name: Create or update GitHub Release
        run: |
          TAG="v${{ steps.version.outputs.version }}"

          # Delete existing release if it exists (for re-runs)
          gh release delete "$TAG" --yes 2>/dev/null || true

          # Delete existing tag if it exists
          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          # Create new release
          gh release create "$TAG" \
            --title "Omni Code $TAG (unsigned)" \
            --notes "Automated unsigned build from \`main\` branch.

          > **Note:** These builds are not code-signed. Your OS may show a warning when running them." \
            --latest \
            artifacts/*
