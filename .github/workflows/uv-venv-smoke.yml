name: Windows uv venv smoke test

on:
  push:
    branches:
      - 'main'
  pull_request:
    types:
      - 'ready_for_review'
      - 'opened'
      - 'synchronize'
  merge_group:
  workflow_dispatch:

env:
  NODE_VERSION: '22'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Drives uv.exe through node-pty with useConpty:false — exactly how the
  # packaged app runs it in production (see src/lib/pty-utils.ts). The matrix
  # above exercises uv directly from PowerShell; this job exercises the
  # winpty code path that is our top suspect for non-ASCII-path failures on
  # personal laptops. If this job fails while the matrix passes, winpty is
  # the culprit and we need to flip useConpty:true (F7).
  node-pty-winpty-smoke:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - 'C:\omni-pty-smoke\ascii\runtime'
          - 'C:\omni-pty-smoke\José María\Ω-runtime'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Generate lockfile hash without version
        id: lockfile-hash
        shell: bash
        run: echo "hash=$(node .github/scripts/generate-lockfile-hash.js)" >> $GITHUB_OUTPUT

      - name: Cache node modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.electron
            ~/.electron-gyp
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-modules-${{ steps.lockfile-hash.outputs.hash }}

      - name: Install deps
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Get UV hash
        id: uv-hash
        shell: bash
        run: echo "hash=$(node -e "console.log(require('./package.json').uv.win.sha256)")" >> $GITHUB_OUTPUT

      - name: Cache UV binary
        id: cache-uv
        uses: actions/cache@v4
        with:
          path: assets/bin
          key: ${{ runner.os }}-uv-${{ steps.uv-hash.outputs.hash }}

      - name: Download uv
        if: steps.cache-uv.outputs.cache-hit != 'true'
        run: npm run download win

      - name: Create venv via node-pty + winpty
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
        run: |
          $script = @'
          const pty = require('node-pty');
          const path = require('path');
          const fs = require('fs');

          const target = process.env.TARGET;
          const uv = path.resolve('assets/bin/uv.exe');
          const parent = path.dirname(target);
          fs.mkdirSync(parent, { recursive: true });

          const args = [
            'venv', '--relocatable', '--prompt', 'omni',
            '--python', '3.11', '--python-preference', 'only-managed',
            '--link-mode', 'copy',
            target,
          ];

          // Mirrors src/lib/pty-utils.ts createPtyProcess exactly.
          const proc = pty.spawn(uv, args, {
            name: 'xterm-color',
            cwd: process.cwd(),
            env: { ...process.env, FORCE_COLOR: '1', PYTHONUNBUFFERED: '1' },
            useConpty: false,
          });

          let output = '';
          proc.onData((d) => { output += d; process.stdout.write(d); });
          proc.onExit(({ exitCode }) => {
            if (exitCode !== 0) {
              console.error(`\n[FAIL] uv venv exited with code ${exitCode}`);
              console.error(`[FAIL] Target was: ${target}`);
              process.exit(exitCode || 1);
            }
            const pythonExe = path.join(target, 'Scripts', 'python.exe');
            if (!fs.existsSync(pythonExe)) {
              console.error(`\n[FAIL] venv created but ${pythonExe} missing`);
              process.exit(1);
            }
            console.log(`\n[OK] venv created at ${target}`);
            process.exit(0);
          });
          '@
          $script | Out-File -Encoding utf8 pty-venv-test.js
          node pty-venv-test.js
          if ($LASTEXITCODE -ne 0) { throw "node-pty venv test failed ($LASTEXITCODE)" }

  uv-venv-smoke:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        # Each case exercises a path shape that has caused real-world venv
        # failures on Windows. Mirrors the exact args used by
        # src/main/omni-install-manager.ts so we fail fast in CI instead of
        # finding out from test users.
        case:
          - name: plain
            dir: 'C:\omni-smoke\plain'
          - name: space-in-path
            dir: 'C:\omni-smoke\Omni Code\runtime'
          - name: deeply-nested
            dir: 'C:\omni-smoke\a\b\c\d\e\f\g\h\i\j\k\l\m\n\o\p\runtime'
          - name: junction-reparse
            dir: 'C:\omni-smoke-link\runtime'
            reparse_source: 'C:\omni-smoke\real-target'
          # Reproduces the failure mode where a user's %USERPROFILE% contains
          # non-ASCII characters (accents, diacritics, non-Latin scripts).
          # winpty (node-pty's useConpty:false fallback) is known to mangle
          # non-ASCII args and cwd, so this is the cheapest way to reproduce
          # or rule out that class of bug for personal-laptop test users.
          - name: non-ascii-path
            dir: 'C:\omni-smoke\José María\Ω-runtime'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Get UV hash
        id: uv-hash
        shell: bash
        run: echo "hash=$(node -e "console.log(require('./package.json').uv.win.sha256)")" >> $GITHUB_OUTPUT

      - name: Cache UV binary
        id: cache-uv
        uses: actions/cache@v4
        with:
          path: assets/bin
          key: ${{ runner.os }}-uv-${{ steps.uv-hash.outputs.hash }}

      - name: Download uv
        if: steps.cache-uv.outputs.cache-hit != 'true'
        run: npm run download win

      - name: Create junction for reparse-point case
        if: matrix.case.name == 'junction-reparse'
        shell: cmd
        run: |
          mkdir "${{ matrix.case.reparse_source }}"
          mklink /J "C:\omni-smoke-link" "${{ matrix.case.reparse_source }}"

      - name: Install managed Python
        shell: pwsh
        run: |
          $uv = Join-Path $PWD 'assets\bin\uv.exe'
          & $uv python install 3.11 --python-preference only-managed
          if ($LASTEXITCODE -ne 0) { throw "uv python install failed ($LASTEXITCODE)" }

      - name: Create venv (matches omni-install-manager args)
        shell: pwsh
        run: |
          $uv = Join-Path $PWD 'assets\bin\uv.exe'
          $target = '${{ matrix.case.dir }}'
          New-Item -ItemType Directory -Force -Path (Split-Path $target) | Out-Null
          & $uv venv --relocatable --prompt omni --python 3.11 --python-preference only-managed $target
          if ($LASTEXITCODE -ne 0) { throw "uv venv failed ($LASTEXITCODE)" }
          if (-not (Test-Path (Join-Path $target 'Scripts\activate'))) {
            throw "venv created but Scripts\activate missing at $target"
          }
          if (-not (Test-Path (Join-Path $target 'Scripts\python.exe'))) {
            throw "venv created but Scripts\python.exe missing at $target"
          }

      - name: Verify target path round-trips through PowerShell
        shell: pwsh
        run: |
          # Sanity check that the target path we just created actually exists
          # with the expected non-ASCII bytes — catches filesystem encoding
          # weirdness on the runner itself before we blame uv or node-pty.
          $target = '${{ matrix.case.dir }}'
          if (-not (Test-Path $target)) { throw "Target path not found after uv venv: $target" }
          Get-ChildItem -LiteralPath $target | Select-Object Name, Length | Format-Table -AutoSize

      - name: Create venv with --link-mode=copy (mitigation check)
        shell: pwsh
        run: |
          $uv = Join-Path $PWD 'assets\bin\uv.exe'
          $target = '${{ matrix.case.dir }}-copy'
          New-Item -ItemType Directory -Force -Path (Split-Path $target) | Out-Null
          & $uv venv --relocatable --prompt omni --python 3.11 --python-preference only-managed --link-mode=copy $target
          if ($LASTEXITCODE -ne 0) { throw "uv venv --link-mode=copy failed ($LASTEXITCODE)" }

      # Note: a prior version of this workflow had a "Locked-file recovery" step
      # that opened a file inside the venv target with FileShare.None, then
      # tried to exercise the rename-aside fallback in removeOrRenameAside.
      # Windows blocks renaming a parent directory while any file inside it
      # is held with FileShare.None, so that test is strictly more pessimistic
      # than real-world antivirus scanners (which use permissive sharing).
      # Removed because it was testing an unreachable code path.

      - name: Dirty-target recovery (simulates cleanVenvDir retry path)
        shell: pwsh
        run: |
          $uv = Join-Path $PWD 'assets\bin\uv.exe'
          $target = '${{ matrix.case.dir }}-dirty'
          New-Item -ItemType Directory -Force -Path $target | Out-Null
          # Drop junk files that make the target look like a non-venv directory —
          # the exact state omni-install-manager's cleanVenvDir is supposed to recover from.
          Set-Content -Path (Join-Path $target 'not-a-venv.txt') -Value 'stale'
          New-Item -ItemType Directory -Force -Path (Join-Path $target 'random-subdir') | Out-Null
          Set-Content -Path (Join-Path $target 'random-subdir\file.txt') -Value 'more stale'
          # Mirror the manager's force-clean-then-retry flow.
          Remove-Item -Recurse -Force $target
          if (Test-Path $target) { throw "Failed to force-clean dirty target $target" }
          & $uv venv --relocatable --prompt omni --python 3.11 --python-preference only-managed --link-mode=copy $target
          if ($LASTEXITCODE -ne 0) { throw "uv venv after force-clean failed ($LASTEXITCODE)" }
          if (-not (Test-Path (Join-Path $target 'Scripts\python.exe'))) {
            throw "Recovered venv missing Scripts\python.exe"
          }
