<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omni Code - Download</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 640px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.5rem;
    }

    .tagline {
      color: #888;
      font-size: 1.1rem;
      margin-bottom: 2.5rem;
    }

    .downloads {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .download-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 0.875rem 1.5rem;
      border-radius: 8px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      color: #e0e0e0;
      text-decoration: none;
      font-size: 1rem;
      transition: background 0.15s, border-color 0.15s;
    }

    .download-btn:hover {
      background: #222;
      border-color: #444;
    }

    .download-btn.recommended {
      background: #1a3a1a;
      border-color: #2a5a2a;
    }

    .download-btn.recommended:hover {
      background: #1e4a1e;
      border-color: #3a6a3a;
    }

    .download-btn .icon {
      font-size: 1.25rem;
      width: 1.5rem;
      text-align: center;
      flex-shrink: 0;
    }

    .download-btn .label {
      flex: 1;
      text-align: left;
    }

    .download-btn .badge {
      font-size: 0.75rem;
      color: #6a6;
      background: #1a2a1a;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .note {
      color: #666;
      font-size: 0.85rem;
      line-height: 1.6;
    }

    .note a {
      color: #888;
      text-decoration: underline;
    }

    .note a:hover {
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Omni Code</h1>
    <p class="tagline">AI-powered development environment</p>

    <div class="downloads" id="downloads">
      <a class="download-btn" id="dl-linux"
         href="https://github.com/emm/omni-code-launcher/releases/latest/download/Omni%20Code-latest.AppImage">
        <span class="icon">&#128039;</span>
        <span class="label">Linux (AppImage)</span>
      </a>
      <a class="download-btn" id="dl-mac-arm"
         href="https://github.com/emm/omni-code-launcher/releases/latest/download/Omni%20Code-latest-arm64.dmg">
        <span class="icon">&#63743;</span>
        <span class="label">macOS Apple Silicon (dmg)</span>
      </a>
      <a class="download-btn" id="dl-mac-intel"
         href="https://github.com/emm/omni-code-launcher/releases/latest/download/Omni%20Code-latest.dmg">
        <span class="icon">&#63743;</span>
        <span class="label">macOS Intel (dmg)</span>
      </a>
      <a class="download-btn" id="dl-windows"
         href="https://github.com/emm/omni-code-launcher/releases/latest/download/Omni%20Code%20Setup%20latest.exe">
        <span class="icon">&#128187;</span>
        <span class="label">Windows (exe)</span>
      </a>
    </div>

    <p class="note">
      These are unsigned builds. Your OS may show a security warning.<br>
      View all releases on <a href="https://github.com/emm/omni-code-launcher/releases">GitHub</a>.
    </p>
  </div>

  <script>
    (function () {
      var ua = navigator.userAgent;
      var id = null;

      if (/Linux/.test(ua)) {
        id = 'dl-linux';
      } else if (/Mac/.test(ua)) {
        // Detect Apple Silicon via WebGL renderer or platform
        var isArm = /arm64|aarch64/i.test(navigator.platform) ||
          (navigator.userAgentData && navigator.userAgentData.architecture === 'arm');
        id = isArm ? 'dl-mac-arm' : 'dl-mac-intel';
      } else if (/Win/.test(ua)) {
        id = 'dl-windows';
      }

      if (id) {
        var el = document.getElementById(id);
        if (el) {
          el.classList.add('recommended');
          var badge = document.createElement('span');
          badge.className = 'badge';
          badge.textContent = 'Detected';
          el.appendChild(badge);
          // Move to top
          el.parentNode.insertBefore(el, el.parentNode.firstChild);
        }
      }
    })();
  </script>
</body>
</html>
