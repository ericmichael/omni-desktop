<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-180.png" />
  <!-- use-credentials so the manifest fetch sends the auth cookie; behind
       EasyAuth an anonymous fetch is redirected to login (blocked by
       manifest-src 'self'). -->
  <link rel="manifest" href="/manifest.webmanifest" crossorigin="use-credentials" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#09090b" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Omni" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src <%- cspScriptSrc %>; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' ws: wss: http: https:; frame-src 'self' http: https:; manifest-src 'self';" />
  <title>Omni Code</title>
  <style>
    body {
      background-color: #09090b !important;
      margin: 0;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/renderer/index.ts"></script>
</body>

</html>
